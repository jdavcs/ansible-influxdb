---

- name: Verify required variables are defined
  ansible.builtin.assert:
    that:
      - influxdb_admin_user is defined
      - influxdb_admin_password is defined
    fail_msg: "Required variable is not defined. See role documentation for required variables."

- name: Include install tasks
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

# If influxdb_user is defined, we assume non-standard dir paths
- name: Create InfluxDB directories
  when: influxdb_user is defined
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ influxdb_user }}"
    group: "{{ influxdb_user }}"
    mode: "0750"
  loop:
    - "{{ influxdb_conf_dir }}"
    - "{{ influxdb_var_dir }}"

- name: Copy InfluxDB configs
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ influxdb_conf_dir }}/{{ item }}"
    mode: "0644"
    backup: "{{ influxdb_backup_configs }}"
  loop:
    - influxdb.conf
  notify:
    - Restart influxdb

# Force a restart in case connection params have changed
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure InfluxDB is started and running
  ansible.builtin.systemd_service:
    name: "{{ influxdb_service_name }}"
    state: started
    enabled: true

- name: Include user management tasks
  ansible.builtin.include_tasks: users.yml
